name: PipeVitta CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Lint and Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Database Client Generate
        run: npm run db:generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          DIRECT_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Lint check
        run: npm run lint

      - name: Build compilation check
        run: npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          DIRECT_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          NEXT_PUBLIC_API_URL: "http://localhost:3000"

      - name: Dependency security audit (SCA)
        run: npm audit --audit-level=high || true

  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/javascript

  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: Production
    needs: [build-and-test, sast-semgrep, secret-scanning]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Apply Prisma Migrations
        run: npx prisma migrate deploy --schema=packages/database/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  deploy-api:
    name: Deploy API (NestJS) to Vercel
    runs-on: ubuntu-latest
    environment: Production
    needs: [migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy API to Vercel
        run: |
          npx vercel pull --yes --environment=production --local-config=apps/api/vercel-api.json --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --local-config=apps/api/vercel-api.json --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod --local-config=apps/api/vercel-api.json --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}

  deploy-web:
    name: Deploy Web App (Next.js) to Vercel
    runs-on: ubuntu-latest
    environment: Production
    needs: [migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Web App to Vercel
        run: |
          npx vercel pull --yes --environment=production --local-config=apps/web-app/vercel-web.json --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --local-config=apps/web-app/vercel-web.json --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod --local-config=apps/web-app/vercel-web.json --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}