<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Reagendar Consulta - Portal do Paciente</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#321200",
                        "surface-container-highest": "#dde2f1",
                        "surface-tint": "#095db7",
                        "on-tertiary-fixed-variant": "#763400",
                        "surface-container-high": "#e3e8f7",
                        "tertiary-container": "#964400",
                        "secondary-fixed-dim": "#4edea3",
                        "surface": "#f9f9ff",
                        "primary-fixed-dim": "#aac7ff",
                        "tertiary": "#723200",
                        "on-surface-variant": "#424752",
                        "primary-fixed": "#d6e3ff",
                        "inverse-on-surface": "#ecf1ff",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#727783",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2b313c",
                        "on-primary-fixed": "#001b3e",
                        "background": "#f9f9ff",
                        "outline-variant": "#c2c6d4",
                        "surface-container": "#e8eefd",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#005236",
                        "inverse-primary": "#aac7ff",
                        "error-container": "#ffdad6",
                        "secondary-container": "#6cf8bb",
                        "on-error-container": "#93000a",
                        "primary": "#004389",
                        "secondary-fixed": "#6ffbbe",
                        "on-secondary-fixed": "#002113",
                        "surface-dim": "#d4dae9",
                        "on-secondary-container": "#00714d",
                        "on-primary-fixed-variant": "#00458d",
                        "on-background": "#161c26",
                        "surface-container-low": "#f0f3ff",
                        "on-tertiary-container": "#ffc9ac",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb68c",
                        "secondary": "#006c49",
                        "surface-bright": "#f9f9ff",
                        "primary-container": "#005ab4",
                        "on-surface": "#161c26",
                        "on-primary-container": "#c0d5ff",
                        "tertiary-fixed": "#ffdbc9",
                        "on-primary": "#ffffff",
                        "surface-variant": "#dde2f1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "touch-target-min": "48px",
                        "stack-sm": "12px",
                        "stack-lg": "40px",
                        "base": "8px",
                        "stack-md": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],

                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

                        "headline-md": ["22px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],

                }
            }
        }

<style>
        /* Hide scrollbar for clean UI in scrollable areas */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="flex items-center h-16 px-margin-mobile w-full bg-surface sticky top-0 z-50 shadow-sm transition-colors duration-200">
<button aria-label="Voltar" class="flex items-center justify-center w-touch-target-min h-touch-target-min -ml-2 text-primary hover:bg-surface-container-high rounded-full transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="ml-2 font-headline-sm text-headline-sm text-primary font-bold">
            Reagendar Consulta
        </h1>
</header>
<!-- Main Canvas -->
<main class="flex-1 px-margin-mobile pt-stack-sm pb-[140px] flex flex-col gap-stack-md">
<!-- Context Warning Card -->
<div class="bg-tertiary-fixed border-l-4 border-tertiary rounded-r-lg p-4 flex gap-3 shadow-[0_4px_12px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">info</span>
<div class="flex flex-col">
<p class="font-body-md text-body-md text-on-tertiary-fixed-variant">
                    Você está reagendando sua consulta de <span class="font-bold">Cardiologia</span> com <span class="font-bold">Dr. Carlos Mendes</span>.
                </p>
</div>
</div>
<!-- Date Selection -->
<section>
<h2 class="font-label-lg text-label-lg text-on-surface mb-stack-sm flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">calendar_month</span>
                Escolha a nova data
            </h2>
<div class="flex overflow-x-auto gap-3 pb-2 -mx-margin-mobile px-margin-mobile snap-x no-scrollbar">
<!-- Date Chip: Past/Unavailable -->
<button class="snap-center shrink-0 flex flex-col items-center justify-center min-w-[72px] h-[80px] rounded-xl border border-outline-variant bg-surface-container-lowest opacity-50 cursor-not-allowed" disabled="">
<span class="font-label-md text-label-md text-outline mb-1">Qua</span>
<span class="font-headline-sm text-headline-sm text-outline">11</span>
<span class="font-label-md text-[10px] text-outline">Out</span>
</button>
<!-- Date Chip: Selected -->
<button class="snap-center shrink-0 flex flex-col items-center justify-center min-w-[72px] h-[80px] rounded-xl bg-primary-container text-on-primary-container shadow-[0_8px_20px_rgba(0,0,0,0.08)] transform scale-105 transition-all">
<span class="font-label-md text-label-md text-on-primary-container opacity-90 mb-1">Qui</span>
<span class="font-headline-md text-headline-md text-on-primary-container">12</span>
<span class="font-label-md text-[10px] text-on-primary-container">Out</span>
</button>
<!-- Date Chip: Available -->
<button class="snap-center shrink-0 flex flex-col items-center justify-center min-w-[72px] h-[80px] rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 duration-100">
<span class="font-label-md text-label-md mb-1">Sex</span>
<span class="font-headline-sm text-headline-sm text-on-surface">13</span>
<span class="font-label-md text-[10px]">Out</span>
</button>
<button class="snap-center shrink-0 flex flex-col items-center justify-center min-w-[72px] h-[80px] rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 duration-100">
<span class="font-label-md text-label-md mb-1">Seg</span>
<span class="font-headline-sm text-headline-sm text-on-surface">16</span>
<span class="font-label-md text-[10px]">Out</span>
</button>
<button class="snap-center shrink-0 flex flex-col items-center justify-center min-w-[72px] h-[80px] rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 duration-100">
<span class="font-label-md text-label-md mb-1">Ter</span>
<span class="font-headline-sm text-headline-sm text-on-surface">17</span>
<span class="font-label-md text-[10px]">Out</span>
</button>
</div>
</section>
<!-- Time Selection -->
<section>
<h2 class="font-label-lg text-label-lg text-on-surface mb-stack-sm flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">schedule</span>
                Horários disponíveis
            </h2>
<div class="grid grid-cols-3 gap-3">
<!-- Unavailable Time -->
<div class="flex items-center justify-center h-touch-target-min rounded-lg border border-surface-variant bg-surface-container-low text-outline font-body-md text-body-md line-through opacity-60">
                    08:00
                </div>
<!-- Available Time -->
<button class="flex items-center justify-center h-touch-target-min rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md hover:bg-surface-container-high transition-colors active:scale-95 duration-100">
                    08:30
                </button>
<!-- Available Time -->
<button class="flex items-center justify-center h-touch-target-min rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md hover:bg-surface-container-high transition-colors active:scale-95 duration-100">
                    09:00
                </button>
<!-- Selected Time -->
<button class="flex items-center justify-center h-touch-target-min rounded-lg bg-primary-container text-on-primary-container font-body-md text-body-md font-medium shadow-sm ring-2 ring-primary-container ring-offset-1 ring-offset-surface transition-all">
                    09:30
                </button>
<!-- Available Time -->
<button class="flex items-center justify-center h-touch-target-min rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md hover:bg-surface-container-high transition-colors active:scale-95 duration-100">
                    10:00
                </button>
<!-- Unavailable Time -->
<div class="flex items-center justify-center h-touch-target-min rounded-lg border border-surface-variant bg-surface-container-low text-outline font-body-md text-body-md line-through opacity-60">
                    10:30
                </div>
<!-- Available Time -->
<button class="flex items-center justify-center h-touch-target-min rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md hover:bg-surface-container-high transition-colors active:scale-95 duration-100">
                    11:00
                </button>
</div>
</section>
<!-- Optional Reason -->
<section>
<h2 class="font-label-lg text-label-lg text-on-surface mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">edit_note</span>
                Motivo <span class="font-normal text-on-surface-variant">(Opcional)</span>
</h2>
<div class="flex flex-wrap gap-2 mb-3">
<button class="px-4 py-1.5 rounded-full border border-outline-variant bg-surface-container-lowest font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors">
                    Imprevisto
                </button>
<button class="px-4 py-1.5 rounded-full border border-primary bg-primary-fixed font-label-md text-label-md text-on-primary-fixed hover:bg-primary-fixed-dim transition-colors">
                    Motivos de Saúde
                </button>
<button class="px-4 py-1.5 rounded-full border border-outline-variant bg-surface-container-lowest font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors">
                    Trabalho
                </button>
</div>
<textarea class="w-full min-h-[100px] p-4 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder:text-outline focus:ring-2 focus:ring-primary-container focus:border-primary-container resize-none transition-shadow" placeholder="Se desejar, adicione mais detalhes sobre o reagendamento..."></textarea>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-surface-variant px-margin-mobile pt-4 pb-safe z-50 shadow-[0_-4px_24px_rgba(0,0,0,0.06)]">
<button class="w-full h-[52px] bg-primary-container text-on-primary-container rounded-lg flex items-center justify-center font-label-lg text-label-lg shadow-sm hover:bg-opacity-90 active:scale-[0.98] transition-all duration-200">
            Confirmar Reagendamento
        </button>
<p class="text-center font-label-md text-label-md text-outline mt-3 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px] text-[#25D366]">chat</span>
            Confirmação será enviada via WhatsApp
        </p>
</div>
</body></html>
