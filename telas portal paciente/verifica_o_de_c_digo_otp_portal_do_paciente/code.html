<style>
        .otp-input:focus {
            box-shadow: 0 0 0 2px #005ab4;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .blinking-cursor::after {
            content: '';
            display: inline-block;
            width: 2px;
            height: 24px;
            background-color: #005ab4;
            animation: blink 1s step-end infinite;
        }
        .soft-gradient {
            background: linear-gradient(180deg, #f9f9ff 0%, #f1f3fc 100%);
        }
        .whatsapp-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.4; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

<body class="bg-surface font-body-md text-on-surface min-h-screen soft-gradient flex flex-col">
<!-- TopAppBar (Shared Component Logic) -->
<header class="fixed top-0 w-full z-50 bg-surface shadow-sm flex items-center h-16 px-margin-mobile w-full">
<button class="material-symbols-outlined text-primary hover:bg-surface-container-high transition-colors active:scale-95 duration-100 p-2 rounded-full -ml-2">

        </button>

<div class="relative w-14 h-14 bg-[#d1fae5] rounded-full flex items-center justify-center">

</div>
<div>

</div>
<div class="flex flex-col items-center gap-2 mt-2">
<span class="font-mono font-bold text-headline-md text-primary-container">(11) 9****-4321</span>
<button class="flex items-center gap-1 text-primary font-label-lg hover:underline transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]">edit</span>

</div>
<!-- OTP Input Grid -->

<div class="w-full aspect-square max-w-[56px] flex items-center justify-center bg-surface-container-low border border-outline-variant rounded-xl text-headline-sm font-bold text-on-surface">2</div>
<div class="w-full aspect-square max-w-[56px] flex items-center justify-center bg-surface-container-low border border-outline-variant rounded-xl text-headline-sm font-bold text-on-surface">9</div>
